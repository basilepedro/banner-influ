<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amorim Global — Central de Banners</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #070d1a;
    --surface: #0d1626;
    --surface2: #111e32;
    --border: rgba(255,255,255,0.08);
    --green: #00ff88;
    --blue: #1a6bff;
    --text: #e8eef8;
    --muted: #5a7090;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 48px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(7,13,26,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-icon {
    height: 40px; width: auto;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon img { width: 38px; height: 38px; object-fit: contain; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
  header span { color: var(--muted); font-size: 13px; margin-left: 6px; }

  .page { display: flex; min-height: calc(100vh - 77px); }

  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: sticky;
    top: 77px;
    height: calc(100vh - 77px);
    overflow-y: auto;
  }
  .sidebar-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 13px; color: #8899aa; font-weight: 500; }
  .field-group input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 11px 14px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .field-group input:focus { border-color: var(--green); }
  .field-group input::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none; }

  .divider { height: 1px; background: var(--border); }

  .btn-batch {
    background: var(--green);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    transition: background .2s, transform .1s;
  }
  .btn-batch:hover { background: #00dd66; }
  .btn-batch:active { transform: scale(.98); }
  .btn-batch:disabled { background: #1a3a28; color: #2a6a48; cursor: not-allowed; }

  .progress-wrap { display: none; flex-direction: column; gap: 8px; }
  .progress-wrap.visible { display: flex; }
  .progress-bar-outer { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--green); border-radius: 3px; width: 0%; transition: width .3s ease; }
  .progress-text { font-size: 12px; color: var(--muted); }

  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    transition: all .2s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .pill.active { border-color: var(--blue); color: #fff; background: rgba(26,107,255,.15); }

  .main { flex: 1; padding: 40px 48px; overflow-x: hidden; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; }
  .section-count {
    font-size: 12px; color: var(--muted);
    background: var(--surface2); padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  .banner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .banner-card:hover { border-color: rgba(26,107,255,.4); transform: translateY(-2px); }

  .card-preview {
    position: relative;
    background: #060c18;
    overflow: hidden;
    cursor: pointer;
  }
  .card-preview iframe {
    border: none;
    display: block;
    pointer-events: none;
  }
  .preview-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    opacity: 0; transition: opacity .2s;
  }
  .card-preview:hover .preview-overlay { opacity: 1; background: rgba(0,0,0,.45); }
  .preview-overlay span {
    font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 2px;
    text-transform: uppercase; background: rgba(26,107,255,.8);
    padding: 8px 18px; border-radius: 4px;
  }

  .card-info {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: #fff; }
  .card-dim { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .card-type {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
  }
  .type-cupom { background: rgba(0,255,136,.1); color: var(--green); border: 1px solid rgba(0,255,136,.2); }
  .type-servicos { background: rgba(26,107,255,.1); color: #6699ff; border: 1px solid rgba(26,107,255,.2); }

  .btn-dl {
    background: var(--blue); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    padding: 9px 16px; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: background .2s; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-dl:hover { background: #0055dd; }

  #render-area {
    position: fixed; left: -9999px; top: 0;
    pointer-events: none; z-index: -1;
  }

  #toast {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--surface2); border: 1px solid var(--green);
    color: #fff; font-size: 13px; font-weight: 500;
    padding: 12px 22px; border-radius: 8px;
    opacity: 0; transform: translateY(10px);
    transition: opacity .3s, transform .3s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const inf = document.getElementById('inp-influencer').value.trim().toUpperCase() || 'NOME DO INFLUENCIADOR';
  const cup = document.getElementById('inp-cupom').value.trim().toUpperCase() || 'CUPOM';

  const visible = BANNERS.filter(b => currentFilter === 'todos' || b.tipo === currentFilter);
  document.getElementById('count-label').textContent = visible.length + ' banner' + (visible.length !== 1 ? 's' : '');

  grid.innerHTML = '';
  visible.forEach(b => {
    const ph = b.h * b.scale;
    const card = document.createElement('div');
    card.className = 'banner-card';
    card.dataset.id = b.id;
    card.innerHTML = `
      <div class="card-preview" style="height:${ph}px" onclick="baixarUm('${b.id}')">
        <iframe
          srcdoc="${escHtml(b.html(inf, cup))}"
          style="width:${b.w}px;height:${b.h}px;transform:scale(${b.scale});transform-origin:top left;"
          scrolling="no"
        ></iframe>
        <div class="preview-overlay"><span>⬇ Baixar PNG</span></div>
      </div>
      <div class="card-info">
        <div class="card-meta">
          <div class="card-name">${b.nome}</div>
          <div class="card-dim">${b.dim}</div>
        </div>
        <span class="card-type type-${b.tipo}">${b.tipo === 'cupom' ? 'Cupom' : 'Serviços'}</span>
        <button class="btn-dl" onclick="event.stopPropagation();baixarUm('${b.id}')">⬇ PNG</button>
      </div>`;
    grid.appendChild(card);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filtrar(tipo, el) {
  currentFilter = tipo;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

document.getElementById('inp-influencer').addEventListener('input', renderCards);
document.getElementById('inp-cupom').addEventListener('input', renderCards);

async function baixarUm(id) {
  const b = BANNERS.find(x => x.id === id);
  if (!b) return;
  const inf = document.getElementById('inp-influencer').value.trim().toUpperCase() || 'INFLUENCIADOR';
  const cup = document.getElementById('inp-cupom').value.trim().toUpperCase() || 'CUPOM';
  await renderAndDownload(b, inf, cup);
  toast('Download iniciado: ' + b.nome);
}

async function baixarTodos() {
  const btn = document.getElementById('btn-batch');
  const wrap = document.getElementById('progress-wrap');
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-text');
  const inf = document.getElementById('inp-influencer').value.trim().toUpperCase() || 'INFLUENCIADOR';
  const cup = document.getElementById('inp-cupom').value.trim().toUpperCase() || 'CUPOM';

  const lista = currentFilter === 'todos' ? BANNERS : BANNERS.filter(b => b.tipo === currentFilter);
  btn.disabled = true;
  wrap.classList.add('visible');

  for (let i = 0; i < lista.length; i++) {
    txt.textContent = `Gerando ${i+1} de ${lista.length}: ${lista[i].nome}...`;
    bar.style.width = ((i / lista.length) * 100) + '%';
    await sleep(80);
    await renderAndDownload(lista[i], inf, cup);
    await sleep(600);
  }

  bar.style.width = '100%';
  txt.textContent = `✓ ${lista.length} banners baixados!`;
  await sleep(2000);
  wrap.classList.remove('visible');
  bar.style.width = '0%';
  btn.disabled = false;
  toast('Todos os banners foram baixados!');
}

function renderAndDownload(b, inf, cup) {
  return new Promise(resolve => {
    const area = document.getElementById('render-area');
    const wrap = document.createElement('div');
    wrap.style.cssText = `width:${b.w}px;height:${b.h}px;position:absolute;top:0;left:0;`;
    wrap.innerHTML = b.html(inf, cup);
    area.appendChild(wrap);

    setTimeout(() => {
      const el = wrap.querySelector('#banner') || wrap.firstElementChild;
      html2canvas(el, { scale: 2, useCORS: true, logging: false }).then(canvas => {
        const slug = (inf + '_' + cup).toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
        const fname = `amorim_${b.id}_${b.nome.toLowerCase().replace(/[^a-z0-9]+/g,'_')}_${slug}.png`;
        const link = document.createElement('a');
        link.download = fname;
        link.href = canvas.toDataURL('image/png');
        link.click();
        area.removeChild(wrap);
        resolve();
      });
    }, 300);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
