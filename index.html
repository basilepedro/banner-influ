<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Amorim Global - Central de Banners</title>
    <style>
        /* --- RESET BÁSICO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #fff;
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #30363d;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .logo-icon img {
            height: 32px;
            width: auto;
        }

        .logo-title {
            font-size: 16px;
            font-weight: 600;
        }

        .logo-sub {
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 42px;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
        }

        .sidebar-section-title {
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* --- CAMPOS DE FORMULÁRIO --- */
        .field-group {
            margin-bottom: 12px;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #fff;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .field-group input:focus {
            border-color: #1a6bff;
        }

        /* --- BOTÕES --- */
        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #1a6bff;
            color: #fff;
        }

        /* --- PROGRESS BAR --- */
        .progress-wrap {
            display: none;
            margin-top: 8px;
        }

        .progress-bar-bg {
            background: #21262d;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar {
            background: #1a6bff;
            height: 6px;
            width: 0%;
            transition: width .3s;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 11px;
            color: #8b949e;
            margin-top: 6px;
            text-align: center;
        }

        /* --- ÁREA PRINCIPAL (MAIN) --- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 20px;
            font-weight: 700;
        }

        .count-label {
            font-size: 13px;
            color: #8b949e;
        }

        /* --- GRID E CARDS DE BANNERS --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-preview {
            position: relative;
            overflow: hidden;
            background: #0d1117;
            cursor: pointer;
            height: 300px;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .preview-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all .2s;
        }

        .preview-overlay span {
            background: rgba(26,107,255,.9);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .card-preview:hover .preview-overlay {
            background: rgba(0,0,0,.4);
            opacity: 1;
        }

        .card-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
        }

        .card-dim {
            font-size: 12px;
            color: #8b949e;
        }

        .downloads-section {
            border-top: 1px solid #30363d;
            padding-top: 12px;
        }

        .downloads-title {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .downloads-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-dl-version {
            background: #1a6bff;
            color: #fff;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        /* --- TOAST DE NOTIFICAÇÃO --- */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a6bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-row">
                <div class="logo-icon">
                    <img src="logo_amorim_sidebar.png" alt="Amorim Logo">
                </div>
                <div class="logo-title">Amorim</div>
            </div>
            <div class="logo-sub">Central de Banners</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Filtros de Busca</div>
            <div class="field-group">
                <label>Nome do Banner</label>
                <input type="text" placeholder="Ex: Cidadania Europeia">
            </div>
            <button class="btn btn-primary">Pesquisar</button>
            
            <div class="progress-wrap">
                <div class="progress-bar-bg">
