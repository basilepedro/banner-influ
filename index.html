<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Amorim Global - Central de Banners</title>
    <style>
        /* --- RESET BÁSICO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #fff;
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #30363d;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .logo-icon img {
            height: 32px;
            width: auto;
        }

        .logo-title {
            font-size: 16px;
            font-weight: 600;
        }

        .logo-sub {
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 42px;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
        }

        .sidebar-section-title {
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* --- CAMPOS DE FORMULÁRIO --- */
        .field-group {
            margin-bottom: 12px;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #fff;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .field-group input:focus {
            border-color: #1a6bff;
        }

        .divider {
            height: 1px;
            background: #30363d;
        }

        /* --- BOTÕES --- */
        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #1a6bff;
            color: #fff;
        }

        .btn-dl {
            background: #1a6bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- BARRA DE PROGRESSO --- */
        .progress-wrap {
            display: none;
            margin-top: 8px;
        }

        .progress-bar-bg {
            background: #21262d;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar {
            background: #1a6bff;
            height: 6px;
            width: 0%;
            transition: width .3s;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 11px;
            color: #8b949e;
            margin-top: 6px;
            text-align: center;
        }

        /* --- ÁREA PRINCIPAL (MAIN) --- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 20px;
            font-weight: 700;
        }

        .count-label {
            font-size: 13px;
            color: #8b949e;
        }

        /* --- GRID E CARDS DE BANNERS --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-preview {
            position: relative;
            overflow: hidden;
            background: #0d1117;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ajuste para as imagens se comportarem bem dentro do card */
        .card-preview img {
            width: 100%;
            height: 180px;
            object-fit: contain; /* Faz com que a imagem inteira apareça sem cortar */
            display: block;
            padding: 10px; /* Um pequeno respiro para os banners não colarem na borda */
        }

        .preview-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all .2s;
        }

        .preview-overlay span {
            background: rgba(26,107,255,.9);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .card-preview:hover .preview-overlay {
            background: rgba(0,0,0,.4);
            opacity: 1;
        }

        .card-info {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #30363d;
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .card-dim {
            font-size: 12px;
            color: #8b949e;
        }

        /* --- TOAST DE NOTIFICAÇÃO --- */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a6bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-row">
                <div class="logo-icon">
                    <img src="https://via.placeholder.com/150x40/1a6bff/ffffff?text=Logo+Aqui" alt="Logo">
                </div>
                <div class="logo-title">Amorim</div>
            </div>
            <div class="logo-sub">Central de Banners</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Filtros de Busca</div>
            <div class="field-group">
                <label>Nome do Banner</label>
                <input type="text" placeholder="Ex: Campanha Dia das Mães">
            </div>
            <button class="btn btn-primary">Pesquisar</button>
            
            <div class="progress-wrap">
                <div class="progress-bar-bg">
                    <div class="progress-bar"></div>
                </div>
                <div class="progress-text">Buscando...</div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="main-header">
            <div class="main-title">Banners Disponíveis</div>
            <div class="count-label">Exibindo 3 banners</div>
        </div>

        <div class="cards-grid">
            
            <div class="card">
                <div class="card-preview">
                    <img src="https://via.placeholder.com/300x250/21262d/ffffff?text=Banner+300x250" alt="Banner Institucional">
                    
                    <div class="preview-overlay">
                        <span>Visualizar Banner</span>
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-name">Banner Institucional (Square)</div>
                        <div class="card-dim">300x250 px</div>
                    </div>
                    <button class="btn-dl">Download</button>
                </div>
            </div>

            <div class="card">
                <div class="card-preview">
                    <img src="https://via.placeholder.com/728x90/21262d/ffffff?text=Banner+728x90" alt="Banner Topo">
                    
                    <div class="preview-overlay">
                        <span>Visualizar Banner</span>
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-name">Banner Topo (Leaderboard)</div>
                        <div class="card-dim">728x90 px</div>
                    </div>
                    <button class="btn-dl">Download</button>
                </div>
            </div>

            <div class="card">
                <div class="card-preview">
                    <img src="https://via.placeholder.com/1080x1080/21262d/ffffff?text=Post+Instagram" alt="Banner Redes Sociais">
                    
                    <div class="preview-overlay">
                        <span>Visualizar Banner</span>
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-name">Banner Redes Sociais</div>
                        <div class="card-dim">1080x1080 px</div>
                    </div>
                    <button class="btn-dl">Download</button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast">Ação realizada com sucesso!</div>

</body>
</html>
